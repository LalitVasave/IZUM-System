<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&amp;family=Space+Grotesk:wght@300;500;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-fixed": "#064200",
                    "primary-container": "#2ff801",
                    "secondary-fixed-dim": "#00d7f0",
                    "primary-dim": "#2be800",
                    "on-tertiary-fixed": "#003f43",
                    "tertiary-fixed": "#17eefa",
                    "secondary-fixed": "#26e6ff",
                    "on-surface-variant": "#acaab1",
                    "on-error-container": "#ffd2c8",
                    "primary": "#8eff71",
                    "inverse-surface": "#fcf8ff",
                    "on-secondary-fixed-variant": "#005964",
                    "error-container": "#b92902",
                    "surface-container-highest": "#25252d",
                    "on-surface": "#f9f5fd",
                    "secondary-dim": "#00d4ec",
                    "tertiary-dim": "#00deea",
                    "background": "#0e0e13",
                    "on-secondary-fixed": "#003a42",
                    "outline": "#76747b",
                    "on-secondary": "#004d57",
                    "tertiary-fixed-dim": "#00deea",
                    "on-secondary-container": "#e8fbff",
                    "surface-tint": "#8eff71",
                    "outline-variant": "#48474d",
                    "secondary-container": "#006875",
                    "on-primary-container": "#0b5800",
                    "primary-fixed": "#2ff801",
                    "primary-fixed-dim": "#2be800",
                    "on-tertiary-fixed-variant": "#005e63",
                    "on-error": "#450900",
                    "inverse-on-surface": "#55545b",
                    "surface-container-low": "#131319",
                    "tertiary-container": "#17eefa",
                    "surface-container-lowest": "#000000",
                    "on-background": "#f9f5fd",
                    "surface-dim": "#0e0e13",
                    "surface-bright": "#2c2b33",
                    "surface": "#0e0e13",
                    "surface-variant": "#25252d",
                    "surface-container": "#19191f",
                    "surface-container-high": "#1f1f26",
                    "error-dim": "#d53d18",
                    "tertiary": "#88f6ff",
                    "on-primary": "#0d6100",
                    "error": "#ff7351",
                    "inverse-primary": "#106f00",
                    "on-primary-fixed-variant": "#0d6200",
                    "secondary": "#00e3fd",
                    "on-tertiary": "#005d62",
                    "on-tertiary-container": "#005458"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Space Grotesk"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .marker-pulse {
            box-shadow: 0 0 0 0 rgba(142, 255, 113, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(142, 255, 113, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(142, 255, 113, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(142, 255, 113, 0); }
        }
        .confidence-ring {
            animation: breathe 4s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.1; }
            50% { transform: scale(1.5); opacity: 0.2; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body overflow-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 py-4 bg-zinc-950/60 backdrop-blur-xl border-b border-white/10 shadow-[0px_0px_12px_rgba(57,255,20,0.08)]">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#39FF14]" data-icon="sensors">sensors</span>
<h1 class="font-['Inter'] font-black tracking-tighter text-[#39FF14] text-xl">IZUM</h1>
</div>
<div class="flex items-center gap-4">
<div class="flex items-center gap-2 px-3 py-1 bg-surface-container-highest/50 rounded-full border border-white/5 backdrop-blur-md">
<div class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></div>
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant">Live Connection</span>
</div>
<span class="material-symbols-outlined text-zinc-400 hover:text-[#39FF14] transition-colors duration-300 cursor-pointer" data-icon="account_circle">account_circle</span>
</div>
</header>
<!-- Main Map Canvas -->
<main class="relative w-full h-screen overflow-hidden">
<!-- Map Background -->
<div class="absolute inset-0 bg-surface">
<img class="w-full h-full object-cover grayscale opacity-40 mix-blend-luminosity" data-alt="Dark monochromatic detailed city street map at night with subtle architectural highlights and high contrast shadows" data-location="San Francisco" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBEvm-kwl65U_zXKzhF4aT8dfcvHx0ar2pcmkFtJCWw0e0bEOXrubwn5PTFgJXR0txdjsFlRWvq_FxkP4aBRD4fN27GS4ifxp56N-yOjRykLdRSCpYODVX9axwBFnFoi7xnCQGVIjfT13KXwrhYhb1ulBfgFiqPbtTvLWlXAIh3WMSLdMl9ZnSaLCtQ9TEVF43JSVM0aSHQvcEkp0U3nMw_5qwdAC5G_oMyn6E0hq4wKmnNcs0f7fg0D8QwszZeji9lFKSPuoanZHHf"/>
<!-- Custom Map Overlay Gradients -->
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent opacity-80"></div>
<div class="absolute inset-0 bg-gradient-to-b from-background via-transparent to-transparent opacity-40"></div>
</div>
<!-- Floating UI: Network Pill -->
<div class="absolute top-24 right-6 z-10">
<div class="flex items-center gap-3 px-4 py-2 bg-surface-container/60 backdrop-blur-xl rounded-xl border-l border-t border-white/10 shadow-2xl">
<div class="flex items-end gap-0.5 h-3">
<div class="w-1 h-1 bg-primary rounded-full"></div>
<div class="w-1 h-2 bg-primary rounded-full"></div>
<div class="w-1 h-3 bg-primary rounded-full"></div>
<div class="w-1 h-2 bg-primary rounded-full opacity-30"></div>
</div>
<span class="font-label text-[11px] font-bold text-primary tracking-tighter">NETWORK FULL</span>
</div>
</div>
<!-- Active Bus Marker -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-20 cursor-pointer">
<!-- Confidence Circle -->
<div class="confidence-ring absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 bg-primary rounded-full blur-3xl opacity-10"></div>
<!-- Main Marker -->
<div class="marker-pulse relative w-10 h-10 bg-primary rounded-full flex items-center justify-center border-4 border-surface shadow-[0_0_20px_rgba(142,255,113,0.5)]">
<span class="material-symbols-outlined text-background text-xl" data-icon="directions_bus" style="font-variation-settings: 'FILL' 1;">directions_bus</span>
<!-- Directional Arrow -->
<div class="absolute -top-1 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[6px] border-l-transparent border-r-[6px] border-r-transparent border-b-[8px] border-b-primary"></div>
</div>
<!-- Marker Label -->
<div class="absolute top-12 left-1/2 -translate-x-1/2 whitespace-nowrap bg-surface-container-highest px-3 py-1 rounded-md border border-white/10 backdrop-blur-md">
<p class="font-label text-[10px] text-on-surface font-bold">ALPHA-09 • 12MPH</p>
</div>
</div>
<!-- Bus Details Floating Card -->
<div class="absolute bottom-32 left-1/2 -translate-x-1/2 w-[calc(100%-48px)] max-w-md z-30">
<div class="bg-zinc-950/60 backdrop-blur-2xl rounded-[2rem] p-6 border-t border-l border-white/15 shadow-[0px_24px_48px_rgba(0,0,0,0.6)]">
<div class="flex items-start justify-between mb-6">
<div>
<div class="flex items-center gap-2 mb-1">
<span class="font-label text-[10px] text-primary uppercase tracking-[0.2em] font-bold">Current Transit</span>
<div class="w-1.5 h-1.5 rounded-full bg-primary shadow-[0_0_8px_#8eff71]"></div>
</div>
<h2 class="text-2xl font-black text-on-surface tracking-tight">Loop North</h2>
<p class="text-on-surface-variant text-sm font-medium">Campus Central ➜ Engineering Wing</p>
</div>
<div class="bg-primary/10 px-4 py-2 rounded-2xl border border-primary/20">
<p class="font-label text-[10px] text-primary uppercase font-bold text-center">ETA</p>
<p class="text-2xl font-black text-primary leading-none">04m</p>
</div>
</div>
<div class="flex items-center gap-3">
<button class="flex-1 bg-gradient-to-r from-primary to-primary-container text-on-primary-fixed font-bold py-3 px-6 rounded-full flex items-center justify-center gap-2 hover:shadow-[0_0_15px_rgba(142,255,113,0.4)] transition-all">
<span class="material-symbols-outlined text-sm" data-icon="route">route</span>
<span class="uppercase font-label tracking-wider text-xs">Notify Entry</span>
</button>
<button class="w-12 h-12 flex items-center justify-center bg-surface-container border border-white/10 rounded-full hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="star" style="font-variation-settings: 'FILL' 0;">star</span>
</button>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-zinc-950/60 backdrop-blur-2xl rounded-t-3xl border-t-[0.5px] border-white/15 shadow-[0px_-24px_48px_rgba(0,0,0,0.4)]">
<!-- Map - Active -->
<a class="flex flex-col items-center justify-center text-[#39FF14] bg-[#39FF14]/10 rounded-full px-5 py-1.5 transition-all scale-110 duration-200 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="map" style="font-variation-settings: 'FILL' 1;">map</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase tracking-widest mt-1">Map</span>
</a>
<!-- Stops -->
<a class="flex flex-col items-center justify-center text-zinc-500 hover:text-zinc-200 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="departure_board">departure_board</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase tracking-widest mt-1">Stops</span>
</a>
<!-- Status -->
<a class="flex flex-col items-center justify-center text-zinc-500 hover:text-zinc-200 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase tracking-widest mt-1">Status</span>
</a>
</nav>
</body></html>
