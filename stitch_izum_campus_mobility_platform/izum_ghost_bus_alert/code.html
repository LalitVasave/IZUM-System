<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>IZUM - Ghost Bus Alert</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-fixed": "#064200",
                    "primary-container": "#2ff801",
                    "secondary-fixed-dim": "#00d7f0",
                    "primary-dim": "#2be800",

                    "tertiary-fixed": "#17eefa",
                    "secondary-fixed": "#26e6ff",
                    "on-surface-variant": "#acaab1",
                    "on-error-container": "#ffd2c8",
                    "primary": "#8eff71",
                    "inverse-surface": "#fcf8ff",
                    "on-secondary-fixed-variant": "#005964",
                    "error-container": "#b92902",
                    "surface-container-highest": "#25252d",
                    "on-surface": "#f9f5fd",
                    "secondary-dim": "#00d4ec",
                    "tertiary-dim": "#00deea",
                    "background": "#0e0e13",
                    "on-secondary-fixed": "#003a42",
                    "outline": "#76747b",
                    "on-secondary": "#004d57",
                    "tertiary-fixed-dim": "#00deea",
                    "on-secondary-container": "#e8fbff",
                    "surface-tint": "#8eff71",
                    "outline-variant": "#48474d",
                    "secondary-container": "#006875",
                    "on-primary-container": "#0b5800",
                    "primary-fixed": "#2ff801",
                    "primary-fixed-dim": "#2be800",
                    "on-tertiary-fixed-variant": "#005e63",
                    "on-error": "#450900",
                    "inverse-on-surface": "#55545b",
                    "surface-container-low": "#131319",
                    "tertiary-container": "#17eefa",
                    "surface-container-lowest": "#000000",
                    "on-background": "#f9f5fd",
                    "surface-dim": "#0e0e13",
                    "surface-bright": "#2c2b33",
                    "surface": "#0e0e13",
                    "surface-variant": "#25252d",
                    "surface-container": "#19191f",
                    "surface-container-high": "#1f1f26",
                    "error-dim": "#d53d18",
                    "tertiary": "#88f6ff",
                    "on-primary": "#0d6100",
                    "error": "#ff7351",
                    "inverse-primary": "#106f00",
                    "on-primary-fixed-variant": "#0d6200",
                    "secondary": "#00e3fd",
                    "on-tertiary": "#005d62",
                    "on-tertiary-container": "#005458"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Space Grotesk"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-border-top-left {
            border-top: 0.5px solid rgba(255, 255, 255, 0.15);
            border-left: 0.5px solid rgba(255, 255, 255, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body selection:bg-primary selection:text-on-primary-fixed overflow-hidden">
<!-- Top Navigation Shell (Suppressed context check: This is an alert screen, but as it's a "Page" level in the app, we keep the anchor header for brand identity but remove the lower nav to prioritize the modal focus) -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 py-4 bg-zinc-950/60 backdrop-blur-xl border-b border-white/10 shadow-[0px_0px_12px_rgba(57,255,20,0.08)]">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#39FF14]" data-icon="sensors">sensors</span>
<span class="font-['Inter'] font-black tracking-tighter text-[#39FF14] text-xl">IZUM</span>
</div>
<div class="flex items-center gap-6">
<span class="material-symbols-outlined text-zinc-400 hover:text-[#39FF14] transition-colors duration-300 cursor-pointer" data-icon="account_circle">account_circle</span>
</div>
</header>
<!-- Main Canvas: Map Backdrop -->
<main class="relative w-full h-screen">
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover grayscale opacity-40 contrast-125" data-alt="high-contrast dark mode stylized city map with glowing green transit lines and dark indigo blocks" data-location="Chicago" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBQO82hCSY36gV45PY4hzkNFoWTW136Q8HV7CwjXkI4ogSD5BZ0I1E3gPNpZHvFuezZISbRCEb5nrFCTD_6Oz8oUZ7QGaLPHdG96bbp375EhZL3rGRXOYUkhfo_bFL-wtV_DFjd_j946saiwtzmVQCokO4d-7rndd_DVSujoHmrWhUz1bJk9A7FeOA5TgQT1dp-PsPhNBVh-mAk-HemIeww8oxuRhFi4z7SMYjWvnXzR1ZcGXQ32v9D7YuWNV4QhGhxsajtEx7qL7kX"/>
<div class="absolute inset-0 bg-gradient-to-b from-background via-transparent to-background opacity-80"></div>
</div>
<!-- Pulse Marker Behind Modal -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-10">
<div class="relative flex items-center justify-center">
<div class="absolute w-32 h-32 bg-white/20 rounded-full blur-2xl"></div>
<div class="absolute w-16 h-16 bg-primary/10 rounded-full animate-ping"></div>
<span class="material-symbols-outlined text-on-surface text-4xl" data-icon="ghost" style="font-variation-settings: 'FILL' 1;">mist</span>
</div>
</div>
<!-- Semi-transparent Overlay -->
<div class="absolute inset-0 bg-background/60 backdrop-blur-sm z-20"></div>
<!-- Alert Modal Container -->
<div class="absolute inset-0 z-30 flex items-center justify-center px-4">
<!-- Modal Card -->
<div class="relative w-full max-w-md bg-surface-container/80 backdrop-blur-2xl rounded-[2rem] p-8 shadow-[0px_24px_48px_rgba(0,0,0,0.4),0px_0px_12px_rgba(142,255,113,0.08)] glass-border-top-left overflow-hidden border border-white/5">
<!-- 60s Countdown Ring (Visual Representation) -->
<svg class="absolute top-0 left-0 w-full h-full pointer-events-none -rotate-90" viewbox="0 0 100 100">
<circle cx="50" cy="50" fill="none" r="49" stroke="rgba(142, 255, 113, 0.1)" stroke-width="0.5"></circle>
<circle class="transition-all duration-[60000ms] linear" cx="50" cy="50" fill="none" r="49" stroke="#8eff71" stroke-dasharray="308" stroke-dashoffset="60" stroke-width="1.5"></circle>
</svg>
<div class="relative z-10 flex flex-col items-center text-center">
<!-- Floating Ghost Icon -->
<div class="mb-6 relative">
<div class="absolute inset-0 bg-primary/20 blur-xl rounded-full"></div>
<div class="w-20 h-20 bg-surface-container-highest rounded-3xl flex items-center justify-center border border-primary/30 shadow-2xl">
<span class="material-symbols-outlined text-primary text-5xl" data-icon="ghost" style="font-variation-settings: 'FILL' 1;">mist</span>
</div>
</div>
<!-- Alert Header -->
<div class="mb-2">
<span class="font-label text-[10px] uppercase tracking-[0.3em] text-primary mb-2 block">Anomaly Detected</span>
<h1 class="text-3xl font-headline font-black tracking-tight text-on-surface">Ghost Bus Alert</h1>
</div>
<!-- Bus Telemetry Details -->
<div class="w-full bg-surface-container-low rounded-2xl p-4 my-6 flex flex-col gap-3">
<div class="flex justify-between items-center px-2">
<span class="font-label text-xs text-on-surface-variant uppercase tracking-widest">Vehicle ID</span>
<span class="font-label text-sm text-primary font-bold">LX-4092</span>
</div>
<div class="h-px bg-white/5 w-full"></div>
<div class="flex justify-between items-center px-2">
<span class="font-label text-xs text-on-surface-variant uppercase tracking-widest">Route</span>
<span class="font-label text-sm text-on-surface font-bold uppercase">North Campus Loop</span>
</div>
<div class="h-px bg-white/5 w-full"></div>
<div class="flex flex-col items-center gap-1 py-2">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-error text-sm" data-icon="emergency_home">emergency_home</span>
<span class="font-label text-error text-xs font-bold uppercase tracking-tighter">Status: Non-Responsive</span>
</div>
<p class="text-on-surface-variant text-sm font-medium">Stationary for <span class="text-on-surface font-bold">18 minutes</span> near West Gate</p>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full flex flex-col gap-3">
<button class="w-full bg-error border border-error/50 text-on-error py-4 rounded-full font-headline font-bold text-sm tracking-wide shadow-[0px_8px_16px_rgba(255,115,81,0.2)] hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-lg" data-icon="report">report</span>
                            Report to Admin
                        </button>
<button class="w-full bg-transparent border border-outline-variant text-on-surface-variant py-4 rounded-full font-headline font-bold text-sm tracking-wide hover:bg-white/5 hover:text-on-surface transition-all flex items-center justify-center gap-2">
                            Dismiss Alert
                        </button>
</div>
<!-- Timer Countdown Text -->
<div class="mt-6">
<span class="font-label text-[10px] text-on-surface-variant/60 uppercase tracking-widest">Auto-closing in 42s</span>
</div>
</div>
</div>
</div>
<!-- Background Detail: Telemetry Stream -->
<div class="absolute bottom-12 right-12 z-10 hidden lg:block opacity-20">
<div class="flex flex-col items-end font-label text-[10px] text-primary gap-1">
<span>LAT: 41.8781° N</span>
<span>LON: 87.6298° W</span>
<span>SYNC_STAT: LOSS_OF_SIGNAL</span>
<span>RETRY_ATTEMPT: 04</span>
</div>
</div>
</main>
<!-- Bottom Shell Suppressed for Focus State as per logic -->
<!-- The alert is a "dead end" transactional focus state. Navigation is suppressed to prioritize resolution. -->
</body></html>
